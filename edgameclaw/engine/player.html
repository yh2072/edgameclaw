<div id="injected-style"></div>
<script>
(function(){
  var params = new URLSearchParams(location.search);
  var course = params.get('course') || '';
  var game = params.get('game') || '';
  if (!course || !game) {
    document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#c080a0;font-family:monospace">Use ?course=COURSE_ID&game=CHUNK_ID</div>';
    return;
  }

  // Store share token from URL into sessionStorage (mirrors course page logic)
  var shareToken = params.get('share') || '';
  if (shareToken && course) sessionStorage.setItem('edgame_share_' + course, shareToken);
  else shareToken = sessionStorage.getItem('edgame_share_' + course) || '';

  var apiBase = location.origin;

  // Build fetch options: forward JWT token and share_token for access control
  var fetchUrl = apiBase + '/api/play/' + encodeURIComponent(course) + '/' + encodeURIComponent(game) + '/package';
  if (shareToken) fetchUrl += '?share_token=' + encodeURIComponent(shareToken);
  var fetchOpts = { headers: {} };
  var jwt = localStorage.getItem('edgame_d1_token');
  if (jwt) fetchOpts.headers['Authorization'] = 'Bearer ' + jwt;

  fetch(fetchUrl, fetchOpts)
    .then(function(r) {
      if (r.status === 401 || r.status === 403) throw new Error('ACCESS_DENIED');
      if (!r.ok) {
        return r.json().then(function(body) {
          if (body && body.reason === 'login_required') throw new Error('ACCESS_DENIED');
          if (body && body.reason === 'rate_limit') throw new Error('RATE_LIMIT');
          throw new Error('Package not found');
        }).catch(function(e) { throw e.message ? e : new Error('Package not found'); });
      }
      return r.json();
    })
    .then(function(pkg) {
      if (pkg.styleBlock) {
        var div = document.getElementById('injected-style');
        if (div) div.outerHTML = pkg.styleBlock;
      }
      window.GAME = pkg.config || {};
      window.SCRIPT = pkg.script || [];
      if (!GAME.audioBase) GAME.audioBase = '/assets/audio/';
      document.title = (pkg.title || 'EdGame') + ' — ' + (pkg.subtitle || '');
      var ui = pkg.ui || {};
      var theme = pkg.theme || {};
      var el;
      if ((el = document.getElementById('title-text'))) el.textContent = pkg.title || 'EdGame';
      if ((el = document.getElementById('subtitle-text'))) el.textContent = pkg.subtitle || '';
      if ((el = document.getElementById('start-hint'))) el.textContent = (ui.startHint || 'Click to start') + ' · ' + (pkg.total_chapters || 6) + ' ' + (ui.chapters || 'chapters');
      if ((el = document.getElementById('name-label'))) el.textContent = ui.nameLabel || 'Name';
      if ((el = document.getElementById('player-name-input'))) el.placeholder = ui.namePlaceholder || 'Your name';
      if ((el = document.getElementById('start-btn'))) el.textContent = ui.startGame || 'Start';
      if ((el = document.getElementById('share-copied-msg'))) el.setAttribute('data-msg', ui.shareCopied || 'Link copied!');
      if ((el = document.getElementById('dialog-next'))) el.textContent = ui.clickToContinue || 'Click to continue';
      if ((el = document.getElementById('back-to-course'))) el.href = apiBase + '/courses/' + encodeURIComponent(course) + '/';
      var shareBtn = document.getElementById('share-btn');
      if (shareBtn) shareBtn.textContent = '\u2398 ' + (ui.shareGame || 'Share');
      var shareOpts = document.querySelectorAll('.share-opt, #share-modal h3');
      shareOpts.forEach(function(o) {
        var a = o.getAttribute('data-action');
        var t = o.tagName === 'H3' ? ui.shareGame : (a === 'copy' ? ui.shareCopyLink : a === 'wechat' ? ui.shareWeChat : a === 'xiaohongshu' ? ui.shareXiaohongshu : a === 'linkedin' ? ui.shareLinkedIn : a === 'twitter' ? ui.shareTwitter : a === 'facebook' ? ui.shareFacebook : a === 'instagram' ? ui.shareInstagram : ui.shareGame);
        if (t) o.setAttribute('title', t);
        if (o.tagName === 'H3') o.textContent = t || 'Share';
        else if (a === 'copy') o.textContent = '\u2398 ' + (ui.shareCopyLink || 'Copy link');
      });
      if (theme.border && (el = document.getElementById('title-cover'))) el.style.border = '2px solid ' + theme.border;
      if (theme.glow && (el = document.getElementById('title-cover'))) el.style.boxShadow = '0 0 30px ' + theme.glow;
      if (theme.muted && (el = document.getElementById('start-hint'))) el.style.color = theme.muted;
      function runInit() {
        var initJs = pkg.init_js;
        if (initJs) {
          var s = document.createElement('script');
          s.textContent = initJs;
          document.body.appendChild(s);
        }
      }
      function injectScripts() {
        window.BACKGROUNDS = window.BACKGROUNDS || [];
        window.CHAR_DRAW_FNS = window.CHAR_DRAW_FNS || {};
        // Load engine.js FIRST so gpx/grect/registerMinigame are defined before
        // pixel art scripts run — prevents "Identifier already declared" SyntaxError
        // when AI-generated pixel art re-declares gpx/grect with const/let.
        var eng = document.createElement('script');
        eng.src = apiBase + '/engine/engine.js';
        eng.onload = function() {
          var parts = [pkg.pixel_art_js, pkg.cover_js].filter(Boolean);
          for (var i = 0; i < parts.length; i++) {
            var code = parts[i];
            if (typeof code !== 'string' || !code.trim()) continue;
            try {
              var s = document.createElement('script');
              s.textContent = code;
              document.body.appendChild(s);
            } catch (err) {
              console.warn('Game: inject script failed', err);
            }
          }
          window.BACKGROUNDS = window.BACKGROUNDS || [];
          window.CHAR_DRAW_FNS = window.CHAR_DRAW_FNS || {};
          // Restore rect/px to the engine's correct implementations in case pixel art
          // defined window.rect/window.px overrides with a different signature.
          // Engine defines rect(x,y,w,h,c) — always use #main canvas context.
          (function() {
            var _mc = document.getElementById('main');
            var _mctx = _mc ? _mc.getContext('2d') : null;
            if (_mctx) {
              window.rect = function(x,y,w,h,c){_mctx.fillStyle=c;_mctx.fillRect(x,y,w,h);};
              window.px = function(x,y,c){_mctx.fillStyle=c;_mctx.fillRect(x,y,1,1);};
            }
          })();
          if (pkg.minigames_js && typeof pkg.minigames_js === 'string' && pkg.minigames_js.trim()) {
            try {
              var s = document.createElement('script');
              s.textContent = pkg.minigames_js;
              document.body.appendChild(s);
            } catch (err) { console.warn('Game: minigames_js inject failed', err); }
          }
          runInit();
        };
        eng.onerror = function() { console.error('Game: failed to load engine.js'); };
        document.body.appendChild(eng);
      }
      injectScripts();
    })
    .catch(function(e) {
      if (e.message === 'ACCESS_DENIED') {
        document.body.innerHTML = '<div style="padding:60px 24px;text-align:center;font-family:monospace;background:#08080b;min-height:100vh"><div style="width:48px;height:48px;margin:0 auto 16px;color:#c8fb50"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div><div style="color:#c8fb50;font-size:18px;margin-bottom:10px">无访问权限</div><div style="color:#7878a0;font-size:13px;margin-bottom:24px">请登录或购买课程后游玩，或通过分享链接预览第一个游戏。</div><a href="/courses/' + encodeURIComponent(course) + '/" style="color:#88ce02;font-size:13px">← 返回课程页面</a></div>';
      } else if (e.message === 'RATE_LIMIT') {
        document.body.innerHTML = '<div style="padding:60px 24px;text-align:center;font-family:monospace;background:#08080b;min-height:100vh"><div style="width:48px;height:48px;margin:0 auto 16px;color:#ff9f0a"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg></div><div style="color:#ffc44d;font-size:18px;margin-bottom:10px">今日加载次数已达上限</div><div style="color:#7878a0;font-size:13px;margin-bottom:24px">请明天再来继续游玩。</div><a href="/courses/' + encodeURIComponent(course) + '/" style="color:#88ce02;font-size:13px">← 返回课程页面</a></div>';
      } else {
        document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#ff6a6a;font-family:monospace">Failed to load game: ' + (e.message || e) + '</div>';
      }
    });
})();
</script>
</head>

<script>
(function(){
  var elMsg = document.getElementById('share-copied-msg');
  var shareCopiedText = (elMsg && elMsg.getAttribute('data-msg')) || 'Link copied!';
  var modal = document.getElementById('share-modal');
  var toast = document.getElementById('share-toast');
  var closeBtn = document.getElementById('share-close');
  function showToast(msg) {
    if (!toast) return;
    toast.textContent = msg;
    toast.classList.add('visible');
    setTimeout(function(){ toast.classList.remove('visible'); }, 2000);
  }
  function getShareUrl() {
    var course = (new URLSearchParams(location.search)).get('course') || (window.GAME && window.GAME.courseId) || '';
    return (window.auth && typeof window.auth.getShareLinkUrl === 'function')
      ? window.auth.getShareLinkUrl(course).catch(function(){ return window.location.href; })
      : Promise.resolve(window.location.href);
  }
  function copyGameLink() {
    getShareUrl().then(function(url) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(function(){ showToast(shareCopiedText); }).catch(function(){ fallbackCopy(url); });
      } else { fallbackCopy(url); }
    }).catch(function(){ fallbackCopy(window.location.href); });
  }
  function fallbackCopy(url) {
    var ta = document.createElement('textarea'); ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0'; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); showToast(shareCopiedText); } catch(e) { showToast(url); }
    document.body.removeChild(ta);
  }
  window.openShareModal = function() {
    if (modal) modal.classList.add('visible');
  };
  function closeShareModal() {
    if (modal) modal.classList.remove('visible');
  }
  if (closeBtn) closeBtn.addEventListener('click', closeShareModal);
  if (modal) modal.addEventListener('click', function(e) { if (e.target === modal) closeShareModal(); });
  var shareBtnEl = document.getElementById('share-btn');
  if (shareBtnEl) shareBtnEl.addEventListener('click', function(){ if (window.openShareModal) window.openShareModal(); });
  var shareOpts = document.querySelectorAll('.share-opt');
  for (var i = 0; i < shareOpts.length; i++) {
    shareOpts[i].addEventListener('click', function() {
      var action = this.getAttribute('data-action');
      if (action === 'copy') { copyGameLink(); return; }
      copyGameLink();
    });
  }
})();
</script>

<script>
/* ── Mobile: auto-lock landscape + scale game to fit viewport ── */
(function(){
  var isMobile = ('ontouchstart' in window || navigator.maxTouchPoints > 0)
               && Math.min(screen.width || 0, screen.height || 0) < 768;
  if (!isMobile) return;

  var GW = 768, GH = 576, PAD = 28;

  /* Calculate and set CSS scale variable */
  function updateScale() {
    var vw = window.innerWidth, vh = window.innerHeight;
    var s = Math.min((vw - PAD * 2) / GW, (vh - PAD * 2) / GH);
    if (s > 1) s = 1;
    document.documentElement.style.setProperty('--mg-scale', s.toFixed(4));
  }

  /* Try to lock orientation to landscape */
  function tryLockLandscape() {
    if (screen.orientation && typeof screen.orientation.lock === 'function') {
      screen.orientation.lock('landscape-primary').catch(function(){});
    }
  }

  /* Show/hide rotate prompt for devices that ignore the lock (e.g. iOS) */
  var overlay = document.getElementById('_rp');
  function updatePrompt() {
    if (!overlay) return;
    var portrait = window.innerHeight > window.innerWidth;
    overlay.classList.toggle('_show', portrait);
  }

  /* Init */
  tryLockLandscape();
  updateScale();
  updatePrompt();

  window.addEventListener('orientationchange', function(){
    setTimeout(function(){ updateScale(); updatePrompt(); }, 300);
  });
  window.addEventListener('resize', function(){ updateScale(); updatePrompt(); });
})();
</script>
